services:
  zalo-sender:
    build: .
    container_name: zalo-auto-messenger
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5100:5100"

    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5100/api/status')"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
